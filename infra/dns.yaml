AWSTemplateFormatVersion: "2010-09-09"
Description: easydread.com Route 53 DNS records

# Deployed with the easydread profile (easydread-cli IAM user).
# Run scripts/cf-deploy-dns.sh to apply changes.

Parameters:
  HostedZoneId:
    Type: String
    Default: Z05099481R278MSYRMTGJ

Resources:

  EasydreadDnsRecords:
    Type: AWS::Route53::RecordSetGroup
    Properties:
      HostedZoneId: !Ref HostedZoneId
      RecordSets:

        # Apex A records — GitHub Pages
        - Name: easydread.com.
          Type: A
          TTL: 300
          ResourceRecords:
            - 185.199.108.153
            - 185.199.109.153
            - 185.199.110.153
            - 185.199.111.153

        # www — GitHub Pages
        - Name: www.easydread.com.
          Type: CNAME
          TTL: 300
          ResourceRecords:
            - donvince.github.io.

        # FTP — pinned to original server, independent of apex
        - Name: ftp.easydread.com.
          Type: A
          TTL: 300
          ResourceRecords:
            - 178.79.166.99

        # Email (ImprovMX) — unchanged
        - Name: easydread.com.
          Type: MX
          TTL: 300
          ResourceRecords:
            - 10 mx1.improvmx.com.
            - 20 mx2.improvmx.com.

        # SPF (ImprovMX) — unchanged
        - Name: easydread.com.
          Type: TXT
          TTL: 300
          ResourceRecords:
            - '"v=spf1 include:spf.improvmx.com ~all"'
