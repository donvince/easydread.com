AWSTemplateFormatVersion: "2010-09-09"
Description: easydread.com infrastructure - IAM

# Route 53 DNS changes are handled by scripts/dns-cutover.sh (UPSERT/DELETE+CREATE)
# CloudFormation cannot create records that already exist, so we keep DNS out of CF.

Parameters:
  HostedZoneId:
    Type: String
    Default: Z05099481R278MSYRMTGJ
    Description: Route 53 hosted zone ID for easydread.com

Resources:

  EasydreadCliUser:
    Type: AWS::IAM::User
    Properties:
      UserName: easydread-cli
      Policies:
        - PolicyName: easydread-route53
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - route53:ListResourceRecordSets
                  - route53:ChangeResourceRecordSets
                  - route53:GetHostedZone
                  - route53:GetChange
                Resource:
                  - !Sub "arn:aws:route53:::hostedzone/${HostedZoneId}"
                  - "arn:aws:route53:::change/*"
              - Effect: Allow
                Action:
                  - route53:ListHostedZones
                Resource: "*"

Outputs:

  IamUserName:
    Value: !Ref EasydreadCliUser
    Description: IAM user for easydread CLI operations

  IamUserArn:
    Value: !GetAtt EasydreadCliUser.Arn
    Description: ARN of the easydread IAM user
